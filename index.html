<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />

    <!-- SEO (50–160字元) -->
    <meta
      name="description"
      content="個人介紹網站:設計師轉職為後端工程師，來自台灣基隆，居住在比利時，正在持續學習與成長中.在歐洲生活發現這邊學校沒有台灣教學來的生動互動性強。"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>個人介紹網站</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      a {
        color: blue;
      }

      html,
      body {
        overflow-x: hidden;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 唯一的 h1 -->
      <h1>關於我</h1>

      <p>
        我原本是一名設計師，目前正在轉職為後端工程師。
        我來自台灣基隆，目前居住在比利時，並持續學習程式開發相關技術。
      </p>

      <!-- 必須有 alt -->
      我家養了一隻狗，牠的名字叫做「max」，是一隻非常可愛的傑克羅素小狗狗。
      <img src="/dog.jpeg" alt="我家的狗" />

      <!-- 必須有有效 href -->
      <p>
        更多資訊：
        <a href="https://example.com">https://example.com</a>
      </p>
    </div>
  </body>
</html>
